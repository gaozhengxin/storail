specVersion: 1.2.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AuthorizedEventHub
    network: arbitrum-sepolia
    source:
      address: "0x50639896E45165B9D8c420AAC0090F5D6782dA8D"
      abi: AuthorizedEventHub
      startBlock: 273317938
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Namespace
        - StorageRecord
        - WriterPermission
        - RegistryEvent
      abis:
        - name: AuthorizedEventHub
          file: ./abis/AuthorizedEventHub.json
      eventHandlers:
        - event: Published(indexed bytes32,indexed address,indexed address,string,string,string,bytes32,string)
          handler: handlePublished
        - event: Updated(indexed bytes32,indexed address,indexed address,string,string,string,bytes32,string)
          handler: handleUpdated
        - event: Deleted(indexed bytes32,indexed address,indexed address,string)
          handler: handleDeleted
        - event: WriterGranted(indexed address,indexed bytes32,indexed address,string)
          handler: handleWriterGranted
        - event: WriterRevoked(indexed address,indexed bytes32,indexed address,string)
          handler: handleWriterRevoked
      file: ./src/authorized-event-hub.ts
