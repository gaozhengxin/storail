<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Storail HTML Asset</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #15302d;
        background: #e7f3f0;
        font-family: system-ui, sans-serif;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 24px;
        border: 2px solid #0f766e;
        border-radius: 8px;
        background: white;
      }
      button {
        min-height: 36px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        color: white;
        background: #0f766e;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      output {
        display: block;
        margin: 14px 0;
        font-size: 18px;
        font-weight: 700;
        color: #0f766e;
      }
      li { margin: 4px 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>Storail HTML Asset</h1>
      <p>Click the button to compute the next Fibonacci window and update the DOM.</p>
      <button id="run" type="button">Run calculation</button>
      <output id="result">No calculation yet</output>
      <ul id="items"></ul>
    </main>
    <script>
      let offset = 0;
      const result = document.getElementById("result");
      const items = document.getElementById("items");

      function fibonacci(count) {
        const values = [0, 1];
        for (let index = 2; index < count; index += 1) {
          values[index] = values[index - 1] + values[index - 2];
        }
        return values;
      }

      document.getElementById("run").addEventListener("click", () => {
        offset += 1;
        const values = fibonacci(10 + offset).slice(offset, offset + 6);
        const sum = values.reduce((total, value) => total + value, 0);
        result.textContent = "Click " + offset + " sum: " + sum;
        items.replaceChildren(...values.map((value, index) => {
          const item = document.createElement("li");
          item.textContent = "fib(" + (index + offset) + ") = " + value;
          return item;
        }));
      });
    </script>
  </body>
</html>
